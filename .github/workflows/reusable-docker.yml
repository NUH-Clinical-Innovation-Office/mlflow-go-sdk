name: Reusable Docker Build & Push

on:
  workflow_call:
    inputs:
      registry:
        description: "Container registry"
        required: false
        type: string
        default: "ghcr.io"
      image_name:
        description: "Image name"
        required: false
        type: string
        default: ${{ github.repository }}
      platforms:
        description: "Target platforms (comma-separated)"
        required: false
        type: string
        default: "linux/arm64"
      push:
        description: "Whether to push the image"
        required: false
        type: boolean
        default: true
    outputs:
      image_tag:
        description: "Full image tag (registry/name:tag)"
        value: ${{ jobs.docker.outputs.image_tag }}
      short_tag:
        description: "Short tag (without registry)"
        value: ${{ jobs.docker.outputs.short_tag }}
      versioned_tag:
        description: "Versioned tag with commit SHA"
        value: ${{ jobs.docker.outputs.versioned_tag }}
      digest:
        description: "Image digest"
        value: ${{ jobs.docker.outputs.digest }}

jobs:
  docker:
    name: Build & Push Image
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_tag: ${{ steps.tags.outputs.short_tag }}
      versioned_tag: ${{ steps.tags.outputs.versioned_tag }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Get Go version from go.mod
        id: go
        run: echo "version=$(grep '^go ' go.mod | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        if: inputs.push
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          BRANCH_NAME_SANITIZED=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g' | tr '[:upper:]' '[:lower:]')
          SHORT_SHA="${GITHUB_SHA::7}"

          if [ "$BRANCH_NAME" = "main" ]; then
            TAG="latest"
            VERSIONED_TAG="${SHORT_SHA}"
          else
            TAG="${BRANCH_NAME_SANITIZED}"
            VERSIONED_TAG="${BRANCH_NAME_SANITIZED}-${SHORT_SHA}"
          fi

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "versioned_tag=${VERSIONED_TAG}" >> $GITHUB_OUTPUT
          echo "short_tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.registry }}/${{ inputs.image_name }}
          tags: |
            type=raw,value=${{ steps.tags.outputs.tag }}
            type=raw,value=${{ steps.tags.outputs.versioned_tag }}
            type=sha,prefix={{branch}}-

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GO_VERSION=${{ steps.go.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image details
        run: |
          echo "Image tags: ${{ steps.meta.outputs.tags }}"
          echo "Image digest: ${{ steps.build.outputs.digest }}"
