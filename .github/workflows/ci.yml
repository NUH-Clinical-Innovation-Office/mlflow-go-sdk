name: CI/CD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & Test
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/reusable-build.yml

  integration-test:
    name: Integration Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify generated API code is up to date
        run: |
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.1
          make openapi
          git diff --exit-code internal/api || (echo "internal/api is stale; run 'make openapi' and commit" && exit 1)
      - name: Lint OpenAPI spec
        run: npx -y @redocly/cli@1.25.11 lint api/openapi.yaml
      - name: Run integration tests
        run: go test -v -tags integration -race -timeout 120s ./internal/integration/...

  docker:
    name: Build & Push Docker Image
    needs: build
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-docker.yml
    secrets: inherit

  security-scan:
    name: Security Scan
    needs: docker
    permissions:
      contents: read
      packages: read
      security-events: write
    uses: ./.github/workflows/reusable-security-scan.yml
    with:
      image_tag: ${{ needs.docker.outputs.image_tag }}
    secrets: inherit

