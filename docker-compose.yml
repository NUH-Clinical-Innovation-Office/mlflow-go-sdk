version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: go-backend-template-db
    environment:
      POSTGRES_USER: ${DB_USER:-dev_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_secure_password_change_me}
      POSTGRES_DB: ${DB_NAME:-go_backend_template}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: go-backend-template-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "16686:16686" # UI
    volumes:
      - jaeger_data:/var/lib/jaeger

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-backend-template-api
    environment:
      - DATABASE_URL=postgres://${DB_USER:-dev_user}:${DB_PASSWORD:-dev_secure_password_change_me}@postgres:5432/${DB_NAME:-go_backend_template}?sslmode=disable
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY environment variable is required}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - SERVICE_NAME=go-backend-template
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started

volumes:
  postgres_data:
  jaeger_data:
